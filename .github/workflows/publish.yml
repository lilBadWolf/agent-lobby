name: 'publish'
on:
  push:
    branches:
      - main

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev
      - name: install frontend dependencies
        run: npm install # or yarn install / pnpm install
      - name: load release notes from RELEASE.md
        shell: bash
        run: |
          if [ ! -f RELEASE.md ]; then
            echo "RELEASE.md not found. Create RELEASE.md with your release notes." >&2
            exit 1
          fi
          printf '%s\n' 'RELEASE_BODY<<EOF_RELEASE_BODY' >> "$GITHUB_ENV"
          cat RELEASE.md >> "$GITHUB_ENV"
          printf '\n' >> "$GITHUB_ENV"
          printf '%s\n' 'EOF_RELEASE_BODY' >> "$GITHUB_ENV"
      - uses: tauri-apps/tauri-action@action-v0.6.2
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__ # the action will replace this with your tauri.conf.json version
          releaseName: 'AgentLobby v__VERSION__'
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
      - name: upload updater artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');
            
            const config = JSON.parse(fs.readFileSync('./src-tauri/tauri.conf.json', 'utf8'));
            const tag = 'app-v' + config.version;
            const platform = '${{ matrix.platform }}';
            
            let bundleDir;
            let patterns;
            
            if (platform.includes('macos')) {
              bundleDir = 'src-tauri/target/aarch64-apple-darwin/release/bundle/macos';
              patterns = ['*.app.tar.gz', '*.app.tar.gz.sig'];
            } else if (platform.includes('ubuntu')) {
              bundleDir = 'src-tauri/target/release/bundle/appimage';
              patterns = ['*.AppImage.tar.gz', '*.AppImage.tar.gz.sig'];
            } else {
              bundleDir = 'src-tauri/target/release/bundle/nsis';
              patterns = ['*.nsis.zip', '*.nsis.zip.sig'];
            }
            
            if (!fs.existsSync(bundleDir)) {
              console.log('Bundle directory not found:', bundleDir);
              process.exit(0);
            }
            
            const files = fs.readdirSync(bundleDir).filter(f => 
              patterns.some(pattern => {
                const regex = new RegExp('^' + pattern.replace(/\*/g, '.*') + '$');
                return regex.test(f);
              })
            );
            
            if (files.length === 0) {
              console.log('No updater artifacts found in', bundleDir);
              process.exit(0);
            }
            
            const filePaths = files.map(f => path.join(bundleDir, f));
            console.log('Uploading:', filePaths.join(', '));
            
            const cmd = 'gh release upload ' + tag + ' ' + filePaths.join(' ') + ' --repo ${{ github.repository }} --clobber';
            execSync(cmd, { stdio: 'inherit' });
          "

  publish-updater-json:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: install minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign
      - name: generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: node .github/scripts/generate-updater-json.mjs
