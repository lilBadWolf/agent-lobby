name: 'publish'
on:
  push:
    branches:
      - main

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: install frontend dependencies
        run: npm install # or yarn install / pnpm install
      - uses: tauri-apps/tauri-action@action-v0.6.2
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__ # the action will replace this with your tauri.conf.json version
          releaseName: 'AgentLobby v__VERSION__'
          releaseBody: 'See the assets below to download.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
      - name: upload updater artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="app-v$(node -p "require('./src-tauri/tauri.conf.json').version")"
          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle/macos"
            PATTERN="*.app.tar.gz *.app.tar.gz.sig"
          elif [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            BUNDLE_DIR="src-tauri/target/release/bundle/appimage"
            PATTERN="*.AppImage.tar.gz *.AppImage.tar.gz.sig"
          else
            BUNDLE_DIR="src-tauri/target/release/bundle/nsis"
            PATTERN="*.nsis.zip *.nsis.zip.sig"
          fi
          FILES=$(find "$BUNDLE_DIR" -maxdepth 1 \( -name "*.tar.gz" -o -name "*.tar.gz.sig" -o -name "*.AppImage.tar.gz" -o -name "*.AppImage.tar.gz.sig" -o -name "*.nsis.zip" -o -name "*.nsis.zip.sig" \) 2>/dev/null)
          if [[ -n "$FILES" ]]; then
            gh release upload "$TAG" $FILES --repo "${{ github.repository }}" --clobber
          else
            echo "No updater artifacts found in $BUNDLE_DIR — skipping upload"
          fi

  publish-updater-json:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/generate-updater-json.mjs
