<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pong Two-User E2E Harness</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #060b10;
        color: #c6ffc6;
        font-family: Consolas, 'Courier New', monospace;
      }

      #app {
        width: min(680px, 96vw);
        height: min(460px, 92vh);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import '/src/styles/global.css';
      import '/src/themes';
      import { createApp, h, ref, shallowRef } from 'vue';
      import PongGame from '/src/components/PongGame.vue';

      const params = new URLSearchParams(window.location.search);
      const room = params.get('room') ?? 'default-room';
      const role = params.get('role') === 'guest' ? 'guest' : 'host';
      const user = params.get('user') ?? (role === 'host' ? 'ALPHA' : 'BRAVO');
      const peerName = params.get('peer') ?? (role === 'host' ? 'BRAVO' : 'ALPHA');
      const isInitiator = role === 'host';
      const autoTrack = params.get('autotrack') === '1' || params.get('autopilot') === '1';

      const persistedThemeRaw = localStorage.getItem('agent_theme');
      let persistedTheme = 'retro-terminal';
      if (persistedThemeRaw) {
        try {
          const parsedTheme = JSON.parse(persistedThemeRaw);
          if (typeof parsedTheme === 'string' && parsedTheme.trim()) {
            persistedTheme = parsedTheme;
          } else if (persistedThemeRaw.trim()) {
            persistedTheme = persistedThemeRaw;
          }
        } catch {
          if (persistedThemeRaw.trim()) {
            persistedTheme = persistedThemeRaw;
          }
        }
      }
      document.documentElement.setAttribute('data-theme', persistedTheme);

      const channelRef = shallowRef(null);
      const startSignal = ref(0);
      const signalBus = new BroadcastChannel(`pong-e2e-signal-${room}`);
      const peerConnection = new RTCPeerConnection({ iceServers: [] });
      const pendingIceCandidates = [];
      let dataChannel = null;
      let peerPresent = false;
      let negotiationStarted = false;
      let helloTimer = null;

      function markChannelOpen() {
        startSignal.value += 1;
      }

      function wireDataChannel(channel) {
        dataChannel = channel;
        channelRef.value = channel;

        if (channel.readyState === 'open') {
          markChannelOpen();
        }

        const previousOnOpen = channel.onopen;
        channel.onopen = (event) => {
          previousOnOpen?.call(channel, event);
          markChannelOpen();
        };
      }

      async function flushPendingIceCandidates() {
        while (pendingIceCandidates.length > 0) {
          const candidate = pendingIceCandidates.shift();
          try {
            await peerConnection.addIceCandidate(candidate);
          } catch {
            // Ignore invalid or stale candidate errors in test harness.
          }
        }
      }

      async function maybeStartNegotiation() {
        if (!isInitiator || !peerPresent || negotiationStarted) {
          return;
        }

        negotiationStarted = true;

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);

        signalBus.postMessage({
          sender: role,
          type: 'offer',
          payload: offer,
        });
      }

      peerConnection.onicecandidate = (event) => {
        if (!event.candidate) {
          return;
        }

        signalBus.postMessage({
          sender: role,
          type: 'ice',
          payload: event.candidate,
        });
      };

      peerConnection.ondatachannel = (event) => {
        wireDataChannel(event.channel);
      };

      signalBus.onmessage = async (event) => {
        const message = event.data;
        if (!message || message.sender === role) {
          return;
        }

        peerPresent = true;

        if (message.type === 'hello') {
          await maybeStartNegotiation();
          return;
        }

        if (message.type === 'offer' && !isInitiator) {
          await peerConnection.setRemoteDescription(message.payload);
          await flushPendingIceCandidates();

          const answer = await peerConnection.createAnswer();
          await peerConnection.setLocalDescription(answer);

          signalBus.postMessage({
            sender: role,
            type: 'answer',
            payload: answer,
          });
          return;
        }

        if (message.type === 'answer' && isInitiator) {
          await peerConnection.setRemoteDescription(message.payload);
          await flushPendingIceCandidates();
          return;
        }

        if (message.type === 'ice') {
          const candidate = message.payload;
          if (!candidate) {
            return;
          }

          if (peerConnection.remoteDescription) {
            try {
              await peerConnection.addIceCandidate(candidate);
            } catch {
              // Ignore invalid or stale candidate errors in test harness.
            }
          } else {
            pendingIceCandidates.push(candidate);
          }
        }
      };

      if (isInitiator) {
        const createdChannel = peerConnection.createDataChannel('dm', { ordered: true });
        wireDataChannel(createdChannel);
      }

      signalBus.postMessage({ sender: role, type: 'hello' });
      helloTimer = window.setInterval(() => {
        signalBus.postMessage({ sender: role, type: 'hello' });
      }, 500);

      peerConnection.addEventListener('connectionstatechange', () => {
        if (peerConnection.connectionState === 'connected' && helloTimer !== null) {
          window.clearInterval(helloTimer);
          helloTimer = null;
        }
      });

      window.addEventListener('beforeunload', () => {
        if (helloTimer !== null) {
          window.clearInterval(helloTimer);
          helloTimer = null;
        }

        try {
          dataChannel?.close();
        } catch {}

        try {
          peerConnection.close();
        } catch {}

        signalBus.close();
      });

      createApp({
        setup() {
          return () => h(PongGame, {
            user,
            peerName,
            dataChannel: channelRef.value,
            startSignal: startSignal.value,
            isInitiator,
            waitingForAcceptance: false,
            autoTrackBall: autoTrack,
          });
        },
      }).mount('#app');
    </script>
  </body>
</html>
