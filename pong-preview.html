<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pong Two-User Movement Preview</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #172734, #05080b 60%);
        color: #d6ffe2;
        font-family: Consolas, 'Courier New', monospace;
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 14px;
        box-sizing: border-box;
      }

      .header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
      }

      .title {
        margin: 0;
        font-size: 20px;
      }

      .note {
        margin: 0;
        opacity: 0.85;
        font-size: 13px;
      }

      .grid {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .panel {
        border: 1px solid #2fd36a;
        border-radius: 10px;
        overflow: hidden;
        background: #020405;
        display: flex;
        flex-direction: column;
      }

      .panel-label {
        padding: 8px 10px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border-bottom: 1px solid rgba(47, 211, 106, 0.35);
        background: rgba(47, 211, 106, 0.08);
      }

      iframe {
        border: 0;
        width: 100%;
        height: 100%;
        min-height: 420px;
        background: #040a06;
      }

      @media (max-width: 1000px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1 class="title">Pong Two-User Movement Preview</h1>
      <p class="note">Alpha is manual control; Bravo auto-tracks the ball so you can watch both directions of sync.</p>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="panel-label">Host (ALPHA) view</div>
        <iframe src="/pong-peer.html?room=preview-shared&role=host&user=ALPHA&peer=BRAVO" title="Host Pong View"></iframe>
      </section>

      <section class="panel">
        <div class="panel-label">Guest (BRAVO) view</div>
        <iframe src="/pong-peer.html?room=preview-shared&role=guest&user=BRAVO&peer=ALPHA&autotrack=1" title="Guest Pong View"></iframe>
      </section>
    </div>
  </body>
</html>
